<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPath</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Edu<span>Path</span></a>
    <div class="nav-links">
      <a href="/">خانه</a>
      <a href="/assessment" class="active">تست راهنمای رشته</a>
      <a href="/dashboard">داشبورد</a>
      <div id="auth-btns" style="display:flex;gap:0.5rem;">
        <button id="open-login" class="btn btn-outline btn-sm">ورود</button>
        <button id="open-register" class="btn btn-primary btn-sm">ثبت‌نام</button>
      </div>
      <div id="user-menu" style="display:none;align-items:center;gap:0.75rem;">
        <span id="nav-username" style="color:var(--text-muted);"></span>
        <button id="logout-btn" class="btn btn-outline btn-sm">خروج</button>
      </div>
    </div>
  </nav>

  <div class="assessment-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="card question-card" id="question-card">
      <p class="question-number" id="question-number"></p>
      <h2 class="question-text" id="question-text"></h2>
      <div class="scale-buttons" id="scale-buttons"></div>
      <div class="scale-labels">
        <span>اصلاً</span>
        <span>خیلی زیاد</span>
      </div>
    </div>

    <div class="assessment-nav">
      <button id="prev-btn" class="btn btn-outline" disabled>قبلی</button>
      <button id="next-btn" class="btn btn-primary">بعدی</button>
    </div>
  </div>

  <div id="auth-modal" class="modal-overlay">
    <div class="modal">
      <h2>برای شرکت در تست وارد شوید</h2>
      <div class="auth-tabs">
        <button class="active" data-tab="login">ورود</button>
        <button data-tab="register">ثبت‌نام</button>
      </div>
      <form id="login-form" class="auth-form active">
        <div class="form-group"><input type="text" id="login-user" placeholder="نام کاربری یا ایمیل" required></div>
        <div class="form-group"><input type="password" id="login-pass" placeholder="رمز عبور" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%">ورود</button>
      </form>
      <form id="register-form" class="auth-form">
        <div class="form-group"><input type="text" id="reg-user" placeholder="نام کاربری" required minlength="3"></div>
        <div class="form-group"><input type="email" id="reg-email" placeholder="ایمیل" required></div>
        <div class="form-group"><input type="password" id="reg-pass" placeholder="رمز عبور" required minlength="6"></div>
        <div class="form-group">
          <select id="reg-grade">
            <option value="دهم">پایه دهم</option>
            <option value="یازدهم" selected>پایه یازدهم</option>
            <option value="دوازدهم">پایه دوازدهم</option>
            <option value="فارغ‌التحصیل">فارغ‌التحصیل</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">ایجاد حساب</button>
      </form>
      <p id="auth-error" class="error-msg"></p>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/assessment.js"></script>
</body>
</html>
